name: Build APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # خطوة 1: حفظ ملفاتك الخاصة في مجلد مؤقت لتجنب حذفها
      - name: Backup Custom Code
        run: |
          mkdir -p temp_backup
          [ -f lib/main.dart ] && cp lib/main.dart temp_backup/ || echo "No main.dart found"
          [ -f pubspec.yaml ] && cp pubspec.yaml temp_backup/ || echo "No pubspec.yaml found"

      # خطوة 2: توليد ملفات الأندرويد اللازمة للبناء
      - name: Create Android Project Files
        run: flutter create . --overwrite

      # خطوة 3: استعادة ملفاتك الخاصة من المجلد المؤقت وكتابتها فوق الملفات الافتراضية
      - name: Restore Custom App Code
        run: |
          [ -f temp_backup/main.dart ] && cp temp_backup/main.dart lib/main.dart || echo "Skip restoring main.dart"
          [ -f temp_backup/pubspec.yaml ] && cp temp_backup/pubspec.yaml pubspec.yaml || echo "Skip restoring pubspec.yaml"

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
